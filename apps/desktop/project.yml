name: Smithers
options:
  bundleIdPrefix: com.smithers
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.0.0"
  STTextView:
    url: https://github.com/krzyzanowskim/STTextView.git
    from: "0.9.0"
  swift-tree-sitter:
    url: https://github.com/tree-sitter/swift-tree-sitter.git
    from: "0.9.0"
  tree-sitter-swift:
    url: https://github.com/alex-pinkus/tree-sitter-swift.git
    branch: with-generated-files
  tree-sitter-javascript:
    url: https://github.com/tree-sitter/tree-sitter-javascript.git
    exactVersion: "0.23.1"
  tree-sitter-python:
    url: https://github.com/tree-sitter/tree-sitter-python.git
    exactVersion: "0.23.6"
  tree-sitter-json:
    url: https://github.com/tree-sitter/tree-sitter-json.git
    exactVersion: "0.24.8"
  tree-sitter-bash:
    url: https://github.com/tree-sitter/tree-sitter-bash.git
    exactVersion: "0.23.3"
  tree-sitter-typescript:
    url: https://github.com/tree-sitter/tree-sitter-typescript.git
    exactVersion: "0.23.2"
  tree-sitter-markdown:
    url: https://github.com/tree-sitter-grammars/tree-sitter-markdown.git
    exactVersion: "0.4.1"
  tree-sitter-zig:
    url: https://github.com/tree-sitter-grammars/tree-sitter-zig.git
    exactVersion: "1.1.2"
  tree-sitter-rust:
    url: https://github.com/tree-sitter/tree-sitter-rust.git
    exactVersion: "0.23.3"
  tree-sitter-go:
    url: https://github.com/tree-sitter/tree-sitter-go.git
    exactVersion: "0.23.4"

targets:
  Smithers:
    type: application
    platform: macOS
    sources:
      - Smithers
    dependencies:
      - package: Sparkle
        product: Sparkle
      - package: STTextView
        product: STTextView
      - package: swift-tree-sitter
        product: SwiftTreeSitter
      - package: tree-sitter-swift
        product: TreeSitterSwift
      - package: tree-sitter-javascript
        product: TreeSitterJavaScript
      - package: tree-sitter-python
        product: TreeSitterPython
      - package: tree-sitter-json
        product: TreeSitterJSON
      - package: tree-sitter-bash
        product: TreeSitterBash
      - package: tree-sitter-typescript
        product: TreeSitterTypeScript
      - package: tree-sitter-markdown
        product: TreeSitterMarkdown
      - package: tree-sitter-zig
        product: TreeSitterZig
      - package: tree-sitter-rust
        product: TreeSitterRust
      - package: tree-sitter-go
        product: TreeSitterGo
      - framework: Carbon.framework
        embed: false
      - framework: ../../ghostty/macos/GhosttyKit.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smithers.desktop
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Smithers/Info.plist
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.10"
        CODE_SIGN_STYLE: Automatic
        DEFINES_MODULE: YES
        SPARKLE_FEED_URL: ""
        SPARKLE_SNAPSHOT_FEED_URL: ""
        SPARKLE_PUBLIC_KEY: ""
        INFOPLIST_KEY_SUFeedURL: $(SPARKLE_FEED_URL)
        INFOPLIST_KEY_SUSnapshotFeedURL: $(SPARKLE_SNAPSHOT_FEED_URL)
        INFOPLIST_KEY_SUPublicEDKey: $(SPARKLE_PUBLIC_KEY)
        OTHER_LDFLAGS: ["-lstdc++"]

  SmithersTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - SmithersTests
    dependencies:
      - target: Smithers
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smithers.desktop.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"
        CODE_SIGN_STYLE: Automatic

  SmithersUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - SmithersUITests
    dependencies:
      - target: Smithers
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smithers.desktop.uitests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"
        CODE_SIGN_STYLE: Automatic
